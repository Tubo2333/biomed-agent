# BioMed-Agent configuration
# Defaults overridable via environment variables: BIOMED_<SECTION>_<KEY>

llm:
  model: deepseek-v4-pro
  temperature: 0.3
  max_tokens: 4000
  thinking_budget_tokens: 1600
  base_url: https://api.anthropic.com

rag:
  top_k_retrieval: 10
  max_search_rounds: 3
  token_budget: 15000
  pubmed_cache_dir: data/pubmed_cache
  pubmed_cache_ttl_hours: 168  # 7 days

benchmark:
  random_seed: 42
  n_test_cases_per_task: 10
  single_agent_timeout_seconds: 600

data:
  cache_index_path: data/cache/analysis_cache_index.json

storage:
  db_path: data/biomed-agent.db

logging:
  level: INFO
  dir: logs
  max_days: 30

api:
  host: 0.0.0.0
  port: 8000

proxy:
  host: ""   # Set via BIOMED_PROXY_HOST env var
  port: 0    # Set via BIOMED_PROXY_PORT env var
